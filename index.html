<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .comparison {
      position: relative;
      display: inline-block;
      user-select: none;
      line-height: 0;
      cursor: ew-resize;
    }

    .comparison img.base {
      display: block;
      max-width: 90vw;
      max-height: 90vh;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .overlay img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .divider-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .grip {
      position: absolute;
      width: 48px;
      height: 48px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
      cursor: ew-resize;
      transform: translate(-50%, -50%);
    }

    .grip svg {
      width: 22px;
      height: 22px;
      fill: #333;
    }
  </style>
</head>
<body>

<div class="comparison" id="comparison">
  <!-- Base image (right side): Shot_01 -->
  <img class="base" id="imgBase" src="Shot_01.png" alt="Image 1">

  <!-- Overlay image (left side, diagonally clipped): Shot_02 -->
  <div class="overlay" id="overlay">
    <img src="Shot_02.png" alt="Image 2">
  </div>

  <!-- Diagonal divider line -->
  <svg class="divider-svg" id="dividerSvg">
    <line id="dividerLine" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <!-- Grip handle -->
  <div class="grip" id="grip">
    <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 4l-4 6 4 6V4zm6 0v12l4-6-4-6z"/>
    </svg>
  </div>
</div>

<script>
  const comparison = document.getElementById('comparison');
  const overlay    = document.getElementById('overlay');
  const dividerLine = document.getElementById('dividerLine');
  const grip       = document.getElementById('grip');

  let pos = 0.5;      // slider position 0–1
  const DIAG = 0.12;  // diagonal tilt as fraction of width
  let dragging = false;

  function update() {
    const W = comparison.offsetWidth;
    const H = comparison.offsetHeight;

    // Diagonal line: tilts from top-right to bottom-left
    // top point is shifted right, bottom point shifted left
    const topX    = (pos + DIAG) * W;
    const bottomX = (pos - DIAG) * W;

    // Clip the overlay to the left of the diagonal
    overlay.style.clipPath =
      `polygon(0px 0px, ${topX}px 0px, ${bottomX}px ${H}px, 0px ${H}px)`;

    // Draw the divider line
    dividerLine.setAttribute('x1', topX);
    dividerLine.setAttribute('y1', 0);
    dividerLine.setAttribute('x2', bottomX);
    dividerLine.setAttribute('y2', H);

    // Grip sits at the midpoint of the diagonal line
    grip.style.left = (pos * W) + 'px';
    grip.style.top  = (H / 2) + 'px';
  }

  function setPos(clientX) {
    const rect = comparison.getBoundingClientRect();
    pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    update();
  }

  window.addEventListener('load', update);
  window.addEventListener('resize', update);

  comparison.addEventListener('mousedown', (e) => {
    dragging = true;
    setPos(e.clientX);
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    setPos(e.clientX);
  });

  window.addEventListener('mouseup', () => { dragging = false; });

  // Touch support
  comparison.addEventListener('touchstart', (e) => {
    dragging = true;
    setPos(e.touches[0].clientX);
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    setPos(e.touches[0].clientX);
  }, { passive: true });

  window.addEventListener('touchend', () => { dragging = false; });
</script>

</body>
</html>
